<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Pointer Fixed</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; /* চাঁদের পজিশন অনুযায়ী */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 135vw; /* অতিকায় বড় চাকা */
            max-width: 900px;
        }

        /* পয়েন্টার - এটি এখন চাকার গায়ের সাথে একদম লেগে থাকবে */
        .royal-pointer {
            width: 95px; 
            /* পয়েন্টারকে নিচে নামিয়ে চাকার একদম ভেতরে লাগানোর জন্য ভ্যালু বাড়ানো হয়েছে */
            margin-bottom: -95px; 
            margin-left: 75px;    /* চাঁদের পাশ দিয়ে হেলে থাকার জন্য */
            z-index: 100;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.9));
            transform: rotate(22deg); 
            transform-origin: bottom center;
            position: relative;
        }

        /* মেইন চাকা */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.3); 
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন */
        .spin-btn {
            position: absolute;
            bottom: 4%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 200px; 
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- পয়েন্টার যা চাকার গায়ে লেগে আছে -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            wheel.style.transform = `scale(1.3) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
