<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Screen Match</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 4%; /* আপনার ইমেজের চাঁদের পজিশন অনুযায়ী */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140vw; /* স্ক্রিনশটের মতো চাকাটিকে আরও বড় করা হয়েছে */
            max-width: 950px;
        }

        /* পয়েন্টার - এটি এখন চাকার গোল্ডেন বর্ডারের ভেতরে থাকবে */
        .royal-pointer {
            width: 85px; 
            /* পয়েন্টারকে চাকার গায়ে লাগানোর জন্য margin-bottom আরও বাড়ানো হয়েছে */
            margin-bottom: -160px; 
            margin-left: 90px;    /* চাঁদের পাশ দিয়ে হেলে থাকার পজিশন */
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            transform: rotate(28deg); /* আপনার ছবিতে যেমনটা আছে সেই অনুযায়ী বাঁকানো */
            transform-origin: bottom center;
            position: relative;
        }

        /* মেইন চাকা - অতিকায় বড় সাইজ */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.4); /* চাকাকে সর্বোচ্চ জুম করা হয়েছে */
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন - পজিশন নিচে */
        .spin-btn {
            position: absolute;
            bottom: 3%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 220px; 
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- পয়েন্টার যা এখন চাকার সাথে একদম লেগে থাকবে -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            // scale(1.4) বজায় রেখে চাকা ঘুরবে
            wheel.style.transform = `scale(1.4) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
