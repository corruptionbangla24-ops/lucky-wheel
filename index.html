<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel Adjusted</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার পজিশন - স্ক্রিনের উপরের দিকে */
        .royal-pointer {
            position: absolute;
            top: 2%; /* একটু উপরে তুলে দেওয়া হয়েছে */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 80px; /* সাইজ কিছুটা ছোট করা হয়েছে */
            z-index: 30;
        }

        /* ২. চাকা পজিশন - পয়েন্টারের ঠিক নিচে */
        .wheel-container {
            position: absolute;
            top: 15%; /* চাকা এবং পয়েন্টারের মাঝে গ্যাপ কমানো হয়েছে */
            width: 480px; /* আপনার স্ক্রিনশট অনুযায়ী সাইজ সেট করা */
            height: 480px;
            z-index: 10;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            mix-blend-mode: multiply; /* সাদা ব্যাকগ্রাউন্ড কিছুটা হালকা করার ট্রিক */
        }

        /* ৩. স্পিন বাটন পজিশন - টেবিলের সামনের দিকে */
        .spin-btn {
            position: absolute;
            bottom: 5%; /* একদম নিচে টেবিলের ওপর */
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 160px;
            mix-blend-mode: multiply; /* সাদা অংশ হালকা করার জন্য */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- পয়েন্টার -->
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <!-- চাকা -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png" alt="Wheel">
        </div>

        <!-- স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 

            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                spinning = false;
                alert("চাকা থেমেছে! অভিনন্দন!");
            }, 5000);
        }
    </script>

</body>
</html>
