<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Long Pointer</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 2%; /* পয়েন্টারটিকে ওপরে আটকানোর জন্য সেটটিকে একটু ওপরে রাখা হলো */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140vw;
            max-width: 950px;
        }

        /* লম্বা এবং ঝুলে থাকা পয়েন্টার */
        .royal-pointer {
            width: 70px;  /* পয়েন্টারটি একটু চিকন করা হয়েছে */
            height: 140px; /* লম্বায় বাড়ানো হয়েছে যাতে ওপর থেকে ঝুলে থাকে */
            object-fit: contain;
            margin-bottom: -55px; /* এটি পয়েন্টারের মাথাকে চাকার ফ্রেমের বাইরে টাচ করাবে */
            margin-left: 95px;    /* ডানে চাঁদের পজিশন অনুযায়ী সরানোর জন্য */
            z-index: 100;
            filter: drop-shadow(0 8px 15px rgba(0,0,0,0.8));
            transform: rotate(28deg); /* ওপরের দিক থেকে বাঁকানো */
            transform-origin: top center; /* ওপরের অংশে আটকানো বোঝানোর জন্য */
            position: relative;
        }

        /* মেইন চাকা */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.4); 
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন */
        .spin-btn {
            position: absolute;
            bottom: 3%; 
            cursor: pointer;
            z-index: 110;
        }

        .spin-btn img {
            width: 220px; 
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- লম্বা পয়েন্টার যা ওপরে আটকানো মনে হবে -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `scale(1.4) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
