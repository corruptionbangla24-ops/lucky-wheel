<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel Pro</title>
    <style>
        /* ১. আপনার পুরো মূল ছবিটি ব্যাকগ্রাউন্ড হিসেবে থাকবে */
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-screen {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ২. রাজকীয় পয়েন্টার পজিশন */
        .royal-pointer {
            position: absolute;
            top: 15%; /* আপনার ছবির পয়েন্টারের জায়গা অনুযায়ী কম-বেশি করুন */
            width: 100px;
            z-index: 10;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        /* ৩. আপনার আলাদা করা চাকাটি এখানে বসবে */
        .wheel-container {
            position: absolute;
            top: 20%; /* পয়েন্টারের ঠিক নিচে */
            width: 520px; /* আপনার চাকার সাইজ অনুযায়ী অ্যাডজাস্ট করুন */
            height: 520px;
            z-index: 5;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
        }

        /* ৪. আপনার আলাদা করা স্পিন বাটনটি টেবিলের ওপর বসবে */
        .spin-btn {
            position: absolute;
            bottom: 8%; /* টেবিলের ওপরের পজিশন */
            cursor: pointer;
            z-index: 20;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 180px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-screen">
        <!-- আলাদা করা পয়েন্টার -->
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <!-- আলাদা করা চাকা (এটিই ঘুরবে) -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png" alt="Wheel">
        </div>

        <!-- আলাদা করা স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomStop = Math.floor(Math.random() * 360);
            currentRotation += (3600 + randomStop); 

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
