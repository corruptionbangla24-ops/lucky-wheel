<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Double Fix</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - ব্যাকগ্রাউন্ডের পয়েন্টারের একদম ওপরে */
        .royal-pointer {
            position: absolute;
            top: 2%; 
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 90px;
            z-index: 30;
            opacity: 0.9; /* কিছুটা স্বচ্ছ যাতে ব্যাকগ্রাউন্ডের সাথে মিশে যায় */
        }

        /* ২. চাকা - ব্যাকগ্রাউন্ডের চাকার ওপর একদম নিখুঁতভাবে বসানো */
        .wheel-container {
            position: absolute;
            top: 13.5%; /* এই মানটি আপনার ব্যাকগ্রাউন্ড অনুযায়ী অ্যাডজাস্ট করা */
            width: 385px; 
            height: 385px;
            z-index: 10;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            mix-blend-mode: multiply; /* সাদা ব্যাকগ্রাউন্ড হালকা করার জন্য */
        }

        /* ৩. স্পিন বাটন - ব্যাকগ্রাউন্ডের বাটনের একদম ওপরে */
        .spin-btn {
            position: absolute;
            bottom: 3.5%; 
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 155px;
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
