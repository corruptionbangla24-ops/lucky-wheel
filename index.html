<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Grand Expansion</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - অনেক উপরে তোলা হয়েছে */
        .royal-pointer {
            position: absolute;
            top: 15%; /* ২৪% থেকে কমিয়ে ১৫% করা হয়েছে যাতে অনেক উপরে থাকে */
            left: 50.2%; 
            transform: translateX(-50%) rotate(180deg);
            width: 100px; /* পয়েন্টারটি সামান্য বড় করা হয়েছে */
            z-index: 100;
        }

        /* ২. চাকা - বিশাল বড় করা হয়েছে (Maximized) */
        .wheel-container {
            position: absolute;
            top: 28%; /* ফ্রেমের একদম মাঝখানে বসানোর জন্য */
            width: 110vw; /* স্ক্রিনের প্রস্থের চেয়েও বড় করা হয়েছে যাতে চারপাশে ছড়িয়ে পড়ে */
            max-width: 600px; 
            aspect-ratio: 1 / 1; /* এটি একদম গোল রাখবে */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 50%;
            mix-blend-mode: multiply;
        }

        /* ৩. স্পিন বাটন - নিচের বাটনটি ঢেকে দেওয়ার জন্য */
        .spin-btn {
            position: absolute;
            bottom: 10%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 220px; /* বাটনটি বড় করা হয়েছে */
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
