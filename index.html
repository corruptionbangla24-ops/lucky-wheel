<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Pixel Perfect</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ১. পয়েন্টার ও চাকার মূল কন্টেইনার (যাতে তারা সবসময় লেগে থাকে) */
        .wheel-unit {
            position: absolute;
            top: 28%; /* ব্যাকগ্রাউন্ডের ফ্রেম অনুযায়ী সামান্য উপরে-নিচে করতে পারেন */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95vw; /* চাকাটি অনেক বড় দেখাবে */
            max-width: 500px;
        }

        /* পয়েন্টার এখন সোজা এবং চাকার একদম মাথায় লেগে থাকবে */
        .royal-pointer {
            width: 80px; 
            margin-bottom: -15px; /* এটি পয়েন্টারকে চাকার গায়ে নামিয়ে দেবে */
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* চাকা - এটি সবসময় গোল থাকবে */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* এটি ডিম হওয়া পুরোপুরি বন্ধ করবে */
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            mix-blend-mode: multiply;
        }

        /* ২. স্পিন বাটন - একদম নিচে পাথরের ধারে */
        .spin-btn {
            position: absolute;
            bottom: 2%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 220px;
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- পয়েন্টার ও চাকা এখন এক সাথে -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন একদম নিচে -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 

            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
