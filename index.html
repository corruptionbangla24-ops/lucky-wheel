   <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Exact Position</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* উপরে ডানদিকে ব্যালেন্স বোর্ড */
        .top-balance {
            position: absolute;
            top: 25px;
            right: 15px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 15px;
            border-radius: 25px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 135vw; 
            max-width: 900px;
        }

        .royal-pointer {
            width: 95px; 
            margin-bottom: -95px; 
            margin-left: 75px;    
            z-index: 100;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.9));
            transform: rotate(22deg); 
            transform-origin: bottom center;
            position: relative;
        }

        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.3); 
        }

        .wheel-container img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* স্পিন বাটন - আপনার মার্ক করা লাল বৃত্তের জায়গায় */
        .spin-btn {
            position: absolute;
            bottom: 22%; /* আপনার ছবির পানির কুণ্ডের পজিশন অনুযায়ী এডজাস্ট করা */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 190px; /* আপনার ছবির সাথে সামঞ্জস্যপূর্ণ সাইজ */
        }

        .spin-btn:active { transform: scale(0.9); }

        /* ব্যালেন্স বাড়ানো কমানোর বক্স - একদম নিচে */
        .bottom-bet-box {
            position: absolute;
            bottom: 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 5px 15px;
            width: 210px;
            height: 55px;
            z-index: 120;
        }

        .btn-math {
            width: 45px;
            height: 45px;
            background: #ffd700;
            border: none;
            border-radius: 50%;
            font-size: 30px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
        }

        .current-bet {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- উপরে ডানে ব্যালেন্স -->
        <div class="top-balance">
            💰 <span id="balance">4890</span>
        </div>

        <!-- চাকা ইউনিট -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন (আপনার মার্ক করা জায়গায়) -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="স্পিন">
        </div>

        <!-- ব্যালেন্স কন্ট্রোল (একদম নিচে) -->
        <div class="bottom-bet-box">
            <button class="btn-math" onclick="changeBet(-10)">-</button>
            <div class="current-bet" id="bet-val">10</div>
            <button class="btn-math" onclick="changeBet(10)">+</button>
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;
        let balance = 4890;
        let currentBet = 10;

        function changeBet(val) {
            if (isSpinning) return;
            currentBet += val;
            if (currentBet < 10) currentBet = 10; 
            document.getElementById('bet-val').innerText = currentBet;
        }

        function startSpin() {
            if (isSpinning) return;
            if (balance < currentBet) {
                alert("ব্যালেন্স নেই!");
                return;
            }

            isSpinning = true;
            balance -= currentBet;
            document.getElementById('balance').innerText = balance;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            wheel.style.transform = `scale(1.3) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
