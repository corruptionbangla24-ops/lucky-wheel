<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Fixed</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - চাকার ঠিক মাথায় পারফেক্ট পজিশন */
        .royal-pointer {
            position: absolute;
            top: 2%; 
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 75px; /* সাইজ কিছুটা কমানো হয়েছে */
            z-index: 30;
        }

        /* ২. চাকা - একদম গোল রাখার জন্য বর্গাকার সাইজ */
        .wheel-container {
            position: absolute;
            top: 12%; /* পয়েন্টার থেকে সামান্য নিচে */
            width: 360px; /* মোবাইল স্ক্রিনের জন্য আদর্শ সাইজ */
            height: 360px; /* উচ্চতা ও প্রস্থ সমান হওয়ায় একদম গোল থাকবে */
            z-index: 10;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* ৩. স্পিন বাটন - একদম নিচে টেবিলের সামনের অংশে */
        .spin-btn {
            position: absolute;
            bottom: 2%; /* একদম নিচের কাছাকাছি নামিয়ে দেওয়া হয়েছে */
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 130px; /* বাটনটি সুন্দর দেখানোর জন্য সাইজ অ্যাডজাস্ট */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- আপনার পাঠানো পয়েন্টার -->
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <!-- আপনার তৈরি করা চাকা -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png" alt="Wheel">
        </div>

        <!-- আপনার আলাদা করা স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => { 
                spinning = false; 
                // এখানে পুরস্কার ঘোষণার জন্য এলার্ট দিতে পারেন
            }, 5000);
        }
    </script>

</body>
</html>
