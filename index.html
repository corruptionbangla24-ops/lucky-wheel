<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Max Size</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - অনেক উপরে তোলা হয়েছে */
        .royal-pointer {
            position: absolute;
            top: 18%; /* আপনার মন্দিরের সিঁড়ির ঠিক ওপরের জায়গায় */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 80px; 
            z-index: 100;
        }

        /* ২. চাকা - বিশাল বড় করা হয়েছে (Fixed Pixel Size) */
        .wheel-container {
            position: absolute;
            top: 25.5%; /* ব্যাকগ্রাউন্ডের গোল ফ্রেমের পজিশন অনুযায়ী */
            width: 375px; /* এটি বাড়িয়ে ৪০০ করতে পারেন যদি আরও বড় চান */
            height: 375px; /* একদম গোল রাখার জন্য সমান মাপ */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            /* সাদা ব্যাকগ্রাউন্ড হালকা করার জন্য */
            mix-blend-mode: multiply; 
        }

        /* ৩. স্পিন বাটন - নিচের বাটনটি নিখুঁতভাবে ঢাকার জন্য */
        .spin-btn {
            position: absolute;
            bottom: 12%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 210px; /* বাটনটি বড় করা হয়েছে */
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
