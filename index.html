<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Screenshot Match</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 145vw; /* বিশাল চাকা */
            max-width: 1000px;
        }

        /* পয়েন্টার - আপনার ছবির মতো বাঁকানো এবং ওপরে আটকানো */
        .royal-pointer {
            width: 80px;
            height: 180px;
            object-fit: contain;
            margin-bottom: -120px; 
            margin-left: 100px; /* ডানে চাঁদের পজিশন অনুযায়ী */
            z-index: 100;
            transform: rotate(26deg);
            transform-origin: top center;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8));
        }

        /* মেইন চাকা */
        .wheel-box {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.4);
        }

        .wheel-box img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* মাঝখানের পয়েন্ট বোর্ড - ছবির মতো ডিজাইন */
        .balance-overlay {
            position: absolute;
            top: 52%; /* চাকার মাঝামাঝি পজিশন */
            background: rgba(40, 30, 10, 0.9);
            border: 3px solid #ffcc00;
            border-radius: 50px;
            padding: 10px 40px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            z-index: 150;
            box-shadow: 0 0 20px rgba(0,0,0,0.8), inset 0 0 10px #ffcc00;
            white-space: nowrap;
        }

        /* স্পিন বাটন - চাকার ঠিক নিচে */
        .spin-btn-container {
            position: absolute;
            bottom: 18%; 
            z-index: 160;
            cursor: pointer;
        }

        .spin-btn-container img {
            width: 180px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7));
        }

        /* নিচের বেট কন্ট্রোল (+/-) */
        .bet-section {
            position: absolute;
            bottom: 5%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            z-index: 170;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffcc00, #b8860b);
            border: 3px solid #5c4400;
            border-radius: 50%;
            font-size: 35px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 5px 0 #3d2d00;
        }

        .control-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #3d2d00;
        }

        .bet-display {
            font-size: 32px;
            font-weight: bold;
            color: #ffcc00;
            text-shadow: 2px 2px 5px #000;
            min-width: 80px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- চাকা ও পয়েন্টার -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel" class="wheel-box">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- মাঝখানের পয়েন্ট বোর্ড -->
        <div class="balance-overlay">
            পয়েন্ট: <span id="user-balance">4970</span>
        </div>

        <!-- স্পিন বাটন -->
        <div class="spin-btn-container" onclick="handleSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>

        <!-- নিচের বেট কন্ট্রোল -->
        <div class="bet-section">
            <button class="control-btn" onclick="updateBet(-10)">-</button>
            <div class="bet-display" id="current-bet">১০</div>
            <button class="control-btn" onclick="updateBet(10)">+</button>
        </div>

    </div>

    <script>
        let currentRotation = 0;
        let isPlaying = false;
        let balance = 4970;
        let bet = 10;

        function updateBet(amount) {
            if (isPlaying) return;
            bet += amount;
            if (bet < 10) bet = 10;
            document.getElementById('current-bet').innerText = bet;
        }

        function handleSpin() {
            if (isPlaying) return;
            if (balance < bet) {
                alert("পয়েন্ট নেই!");
                return;
            }

            isPlaying = true;
            balance -= bet;
            document.getElementById('user-balance').innerText = balance;

            const wheelElement = document.getElementById('wheel');
            const extraDegrees = Math.floor(Math.random() * 360) + 1800; // ৫ বার ঘুরবে
            currentRotation += extraDegrees;

            wheelElement.style.transform = `scale(1.4) rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isPlaying = false;
                // জয়ী পয়েন্ট যোগ করার লজিক এখানে হবে
            }, 5000);
        }
    </script>

</body>
</html>
