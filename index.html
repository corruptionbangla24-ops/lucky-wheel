<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Perfect Adjusted</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 80vw;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* পয়েন্টার ও চাকার মূল কন্টেইনার */
        .wheel-unit {
            position: absolute;
            top: 25%; /* ব্যাকগ্রাউন্ড অনুযায়ী পজিশন */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 330vw; /* চাকাটি বড় দেখাবে */
            max-width: 660px;
        }

        /* পয়েন্টার - চাকার সাথে একদম এডজাস্ট করা */
        .royal-pointer {
            width: 70px; /* পয়েন্টার সাইজ সামান্য ছোট করা হয়েছে */
            margin-bottom: -12px; /* এটি পয়েন্টারকে টেনে চাকার গায়ে নামিয়ে দেবে */
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* চাকা - এটি গোল থাকবে এবং ডিম হবে না */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            mix-blend-mode: multiply;
        }

        /* স্পিন বাটন - আপনার অনুরোধ অনুযায়ী ছোট করা হয়েছে */
        .spin-btn {
            position: absolute;
            bottom: 3%; /* পাথরের ধারের কাছে পজিশন */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 160px; /* ১৮০ থেকে কমিয়ে ১৬০ করা হয়েছে (ছোট বাটন) */
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- পয়েন্টার চাকার সাথে এডজাস্ট করা -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- ছোট করা স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
