<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Pointer Adjusted</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; /* চাঁদের পজিশন অনুযায়ী চাকাটিকে ওপরের দিকে রাখা হয়েছে */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 120vw; /* চাকা বড় দেখানোর জন্য */
            max-width: 700px;
        }

        /* পয়েন্টার - চাঁদের নিচে এবং চাকার সাথে লাগানো */
        .royal-pointer {
            width: 90px; /* পয়েন্টারের সাইজ */
            margin-bottom: -45px; /* এটি পয়েন্টারকে টেনে চাকার একদম গায়ের ওপর নিয়ে আসবে */
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.7));
            /* চাঁদের সাথে পজিশন মিলাতে চাইলে নিচের margin-top ব্যবহার করতে পারেন */
            margin-top: 10px; 
        }

        /* চাকা কন্টেইনার */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.15); /* চাকা জুম করার জন্য */
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন */
        .spin-btn {
            position: absolute;
            bottom: 5%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 180px; 
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- পয়েন্টার - যা চাঁদের নিচ থেকে চাকার গায়ে লেগে থাকবে -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            // জুম স্কেল ঠিক রেখে ঘুরবে
            wheel.style.transform = `scale(1.15) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
