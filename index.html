<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Fixed</title>
    <style>
        /* ১. ব্যাকগ্রাউন্ড সেটআপ */
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ২. চাকা - একদম গোল রাখার জন্য বর্গাকার সাইজ (Width = Height) */
        .wheel-container {
            position: absolute;
            top: 25%; /* আপনার ছবির মন্দিরের সামনে চাকাটি রাখার জন্য */
            width: 320px; /* মোবাইলের জন্য পারফেক্ট গোল সাইজ */
            height: 320px; /* এটি অবশ্যই Width এর সমান হতে হবে যাতে গোল থাকে */
            z-index: 10;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ছবি চ্যাপ্টা হওয়া রোধ করবে */
            border-radius: 50%;
        }

        /* ৩. পয়েন্টার - চাকার ঠিক মাথায় পারফেক্ট পজিশন */
        .royal-pointer {
            position: absolute;
            top: 22%; /* চাকার সামান্য ওপরে */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 60px;
            z-index: 30;
        }

        /* ৪. স্পিন বাটন - নিচের টেবিল বা পাথরের ওপর */
        .spin-btn {
            position: absolute;
            bottom: 8%; /* আপনার ছবির নিচের 'স্পিন' বাটনের জায়গার সাথে মিল রেখে */
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 130px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- আপনার আলাদা করা পয়েন্টার -->
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <!-- আপনার আলাদা করা চাকা -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png" alt="Wheel">
        </div>

        <!-- আপনার আলাদা করা স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            
            setTimeout(() => { 
                spinning = false; 
                alert("চাকা থেমেছে! অভিনন্দন!");
            }, 5000);
        }
    </script>

</body>
</html>
