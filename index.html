<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Max Scale</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - চাকার ঠিক মাথায় পারফেক্ট পজিশন */
        .royal-pointer {
            position: absolute;
            top: 25.5%; /* ব্যাকগ্রাউন্ডের পয়েন্টারের ওপর খাপে খাপে বসার জন্য */
            left: 50.1%; 
            transform: translateX(-50%) rotate(180deg);
            width: 85px; 
            z-index: 100;
        }

        /* ২. চাকা - বিশাল বড় করা হয়েছে (সর্বোচ্চ প্রসারিত) */
        .wheel-container {
            position: absolute;
            top: 30.5%; /* ফ্রেমের একদম মাঝখানে */
            width: 115vw; /* স্ক্রিনের চেয়েও ১৫% বড় করা হয়েছে যাতে চারপাশে ছড়িয়ে পড়ে */
            max-width: 580px; 
            aspect-ratio: 1 / 1; /* এটি চাকাটিকে কোনোভাবেই ডিম হতে দেবে না */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 50%;
            mix-blend-mode: multiply; /* সাদা অংশ ব্যাকগ্রাউন্ডের সাথে মিশিয়ে দেবে */
        }

        /* ৩. স্পিন বাটন - একদম নিচে আপনার লাল মার্ক করা পাথরের ধারের কাছে */
        .spin-btn {
            position: absolute;
            bottom: 1.5%; /* ৮% থেকে কমিয়ে ১.৫% করা হয়েছে যাতে একদম নিচে থাকে */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 220px; /* বাটনটি বড় করে নিচেরটি ঢেকে দেওয়া হয়েছে */
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
