<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Layout Fixed</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* উপরে ডানদিকে ব্যালেন্স বোর্ড (আপনার ছবির মতো) */
        .top-balance {
            position: absolute;
            top: 25px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            font-size: 20px;
            z-index: 200;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 135vw; 
            max-width: 900px;
        }

        .royal-pointer {
            width: 95px; 
            margin-bottom: -95px; 
            margin-left: 75px;    
            z-index: 100;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.9));
            transform: rotate(22deg); 
            transform-origin: bottom center;
            position: relative;
        }

        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.3); 
        }

        .wheel-container img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* নিচের কন্ট্রোল সেকশন (স্পিন বাটন + বেট বোর্ড) */
        .controls-wrapper {
            position: absolute;
            bottom: 5%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* স্পিন বাটন এবং প্লাস-মাইনাস বক্সের মধ্যবর্তী গ্যাপ */
            z-index: 150;
        }

        /* স্পিন বাটন (কন্ট্রোল বক্সের ঠিক উপরে) */
        .spin-btn {
            cursor: pointer;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 220px; /* আপনার ছবির সাথে মিলিয়ে কিছুটা বড় করা হয়েছে */
        }

        .spin-btn:active { transform: scale(0.9); }

        /* ব্যালেন্স বাড়ানো কমানোর বক্স (ছবির লেআউট অনুযায়ী) */
        .bet-control-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 5px 15px;
            width: 220px; /* স্পিন বাটনের সাথে সামঞ্জস্যপূর্ণ */
            height: 55px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .btn-math {
            width: 45px;
            height: 45px;
            background: #ffd700;
            border: none;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -3px 5px rgba(0,0,0,0.3);
        }

        .btn-math:active { transform: scale(0.95); }

        .current-bet {
            color: #fff;
            font-size: 26px;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- উপরে ডানে ব্যালেন্স -->
        <div class="top-balance">
            💰 <span id="balance">4900</span>
        </div>

        <!-- চাকা ইউনিট -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- নিচের কন্ট্রোল সেটআপ -->
        <div class="controls-wrapper">
            <!-- স্পিন বাটন - এটি এখন প্লাস/মাইনাস বক্সের ঠিক ওপরে -->
            <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
                <img src="spin-button.png" alt="স্পিন">
            </div>

            <!-- ব্যালেন্স বাড়ানোর/কমানোর প্যানেল -->
            <div class="bet-control-box">
                <button class="btn-math" onclick="changeBet(-10)">-</button>
                <div class="current-bet" id="bet-val">10</div>
                <button class="btn-math" onclick="changeBet(10)">+</button>
            </div>
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;
        let balance = 4900;
        let currentBet = 10;

        function changeBet(val) {
            if (isSpinning) return;
            currentBet += val;
            if (currentBet < 10) currentBet = 10; 
            document.getElementById('bet-val').innerText = currentBet;
        }

        function startSpin() {
            if (isSpinning) return;

            if (balance < currentBet) {
                alert("ব্যালেন্স পর্যাপ্ত নয়!");
                return;
            }

            isSpinning = true;
            balance -= currentBet;
            document.getElementById('balance').innerText = balance;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            wheel.style.transform = `scale(1.3) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
