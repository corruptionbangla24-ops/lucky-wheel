<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Big Screen Edition</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%;
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* পুরো স্ক্রিন কন্ট্রোল করার মেইন র‍্যাপার */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট - ৯৫% চওড়া এবং ওপরের দিকে */
        .wheel-unit {
            position: absolute;
            top: 12%; /* স্ক্রিনশট অনুযায়ী ওপরের দিকে পজিশন */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 95vw; /* চাকাটি মোবাইলের দুই ধার ঘেঁষে বড় দেখাবে */
            max-width: 600px; /* পিসি বা বড় স্ক্রিনে অতিরিক্ত বড় হওয়া আটকাবে */
        }

        /* পয়েন্টার এডজাস্টমেন্ট */
        .royal-pointer {
            width: 75px; 
            margin-bottom: -18px; /* পয়েন্টার চাকার ওপর পারফেক্টলি বসে থাকবে */
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* চাকা কন্টেইনার - এটি গোল থাকবে */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন - আপনার ছবির মতো নিচে পজিশন */
        .spin-btn {
            position: absolute;
            bottom: 10%; /* নিচ থেকে ১০% ওপরে */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 170px; /* বাটনটি সুন্দর এবং স্পষ্ট দেখাবে */
        }

        .spin-btn:active { 
            transform: scale(0.9); 
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- চাকা এবং পয়েন্টার ইউনিট -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            // কমপক্ষে ১০ বার ঘুরবে + রেন্ডম ডিগ্রি
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            wheel.style.transform = `rotate(${rotation}deg)`;

            // ৫ সেকেন্ড পর স্পিন শেষ
            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
