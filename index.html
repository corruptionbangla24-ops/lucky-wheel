<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel Final</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - চাকার ঠিক মাথায় */
        .royal-pointer {
            position: absolute;
            top: 2%; /* একটু নিচে নামাতে চাইলে ৫% দিন */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 80px;
            z-index: 30;
        }

        /* ২. চাকা - একদম গোল রাখার জন্য Width ও Height সমান দেওয়া হয়েছে */
        .wheel-container {
            position: absolute;
            top: 15%; 
            width: 380px; /* আপনার ফোনের স্ক্রিন অনুযায়ী ৪৫০ থেকে কমিয়ে ৩৮০ করা হয়েছে */
            height: 380px; /* এটি অবশ্যই Width এর সমান হতে হবে যাতে গোল থাকে */
            z-index: 10;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ছবি যাতে চ্যাপ্টা না হয় */
        }

        /* ৩. স্পিন বাটন - চাকার অনেক নিচে টেবিলের ওপর */
        .spin-btn {
            position: absolute;
            bottom: 3%; /* ৮% থেকে কমিয়ে ৩% করা হয়েছে যাতে চাকার নিচে থাকে */
            cursor: pointer;
            z-index: 50;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 140px; /* বাটনটি কিছুটা ছোট করা হয়েছে */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png" alt="Wheel">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
