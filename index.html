<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel | Host on GitHub</title>
    <style>
        /* পুরো স্ক্রিন সেটআপ */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background: #000 url('background.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        /* গেম কন্টেইনার */
        .game-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* পয়েন্টার স্টাইল */
        .royal-pointer {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 120px;
            z-index: 20;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* চাকা ঘোরানোর লজিক */
        .wheel-box {
            width: 420px;
            height: 420px;
            border-radius: 50%;
            border: 10px solid #d4af37;
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background-color: white; /* ব্যাকআপ কালার */
        }

        .wheel-box img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* স্পিন বাটন */
        .spin-btn {
            margin-top: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 220px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .spin-btn:active {
            transform: scale(0.9);
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- পয়েন্টার ইমেজ -->
        <img src="pointer.png" class="royal-pointer" alt="Pointer">

        <!-- চাকা ইমেজ -->
        <div id="wheel-frame" class="wheel-box">
            <img src="wheel.png" alt="Lucky Wheel">
        </div>

        <!-- স্পিন বাটন ইমেজ -->
        <div class="spin-btn" onclick="spinNow()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function spinNow() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-frame');
            // অন্তত ১০ বার পূর্ণ ঘূর্ণন + র‍্যান্ডম স্টপ (০-৩৬০ ডিগ্রি)
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 

            wheel.style.transform = `rotate(${rotation}deg)`;

            // ৫ সেকেন্ড পর স্পিন শেষ হলে মেসেজ
            setTimeout(() => {
                isSpinning = false;
                console.log("পুরস্কার নির্ধারিত হয়েছে!");
            }, 5000);
        }
    </script>

</body>
</html>
