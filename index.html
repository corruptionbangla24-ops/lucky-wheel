<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Pro Adjusted</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - ব্যাকগ্রাউন্ডের পয়েন্টারের একদম ওপরে */
        .royal-pointer {
            position: absolute;
            top: 31.5%; /* ব্যাকগ্রাউন্ড অনুযায়ী সুনির্দিষ্ট পজিশন */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 85px;
            z-index: 100;
        }

        /* ২. চাকা - বড় করা হয়েছে এবং একদম গোল থাকবে */
        .wheel-container {
            position: absolute;
            top: 34.5%; /* ব্যাকগ্রাউন্ডের চাকার ওপর বসানোর জন্য */
            width: 82vw; /* চাকাটি বড় করা হয়েছে */
            max-width: 440px; 
            aspect-ratio: 1 / 1; /* ডিম হওয়া রোধ করবে */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            mix-blend-mode: multiply; /* পেছনের সাদা ভাব কমানোর ট্রিক */
        }

        /* ৩. স্পিন বাটন - ব্যাকগ্রাউন্ডের বাটনটিকে পুরোপুরি ঢেকে দেবে */
        .spin-btn {
            position: absolute;
            bottom: 12.5%; /* ব্যাকগ্রাউন্ডের বাটনের পজিশন অনুযায়ী */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 195px; /* বাটনটি বড় করে ব্যাকগ্রাউন্ডেরটি ঢেকে দেওয়া হয়েছে */
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
