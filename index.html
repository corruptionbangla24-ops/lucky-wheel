<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Mobile Optimized</title>
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            height: 100%;
            width: 100%;
            display: flex; 
            justify-content: center; 
            align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* স্ক্রিন যেন ডানে-বামে না নড়ে */
        }

        /* পুরো স্ক্রিন কন্ট্রোল করার মেইন র‍্যাপার */
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টারের মূল অংশ - ওপরের দিকে (Top: 10%) */
        .wheel-unit {
            position: absolute;
            top: 10%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 85vw; /* মোবাইলে স্ক্রিনের ৮৫% জায়গা জুড়ে বড় দেখাবে */
            max-width: 500px; /* পিসি বা বড় স্ক্রিনে ৫০০০ পিক্সেলের বেশি হবে না */
        }

        /* পয়েন্টার - চাকার সাথে একদম পারফেক্টলি সেট করা */
        .royal-pointer {
            width: 65px; 
            margin-bottom: -15px; /* পয়েন্টারটিকে চাকার কিছুটা ভেতরে ঢুকিয়ে দেয়া হয়েছে */
            z-index: 100;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* চাকা - এটি গোল থাকবে এবং ডিম্বাকৃতি হবে না */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1; /* চাকা সবসময় গোল রাখবে */
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            /* mix-blend-mode: multiply; (আপনার ইমেজে সাদা ব্যাকগ্রাউন্ড থাকলে এটি অন রাখুন) */
        }

        /* স্পিন বাটন - স্ক্রিনের নিচের দিকে পজিশন */
        .spin-btn {
            position: absolute;
            bottom: 8%; /* নিচে থেকে ৮% ওপরে */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent; /* মোবাইলে ক্লিক করলে নীল বক্স আসবে না */
        }

        .spin-btn img {
            width: 150px; /* মোবাইলের জন্য স্ট্যান্ডার্ড সাইজ */
        }

        .spin-btn:active { 
            transform: scale(0.9); 
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- চাকা এবং পয়েন্টার ইউনিট -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            // যদি চাকা আগে থেকেই ঘুরতে থাকে তবে নতুন করে ক্লিক কাজ করবে না
            if (isSpinning) return;
            
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            // রেন্ডমলি ঘুরানোর লজিক (কমপক্ষে ১০ বার ঘুরবে + রেন্ডম ডিগ্রি)
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            wheel.style.transform = `rotate(${rotation}deg)`;

            // ৫ সেকেন্ড পর স্পিন শেষ হলে আবার ক্লিক করার সুযোগ পাবে
            setTimeout(() => {
                isSpinning = false;
                // এখানে আপনি চাইলে রেজাল্ট দেখানোর পপ-আপ অ্যাড করতে পারেন
            }, 5000);
        }
    </script>

</body>
</html>
