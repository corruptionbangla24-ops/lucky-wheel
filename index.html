<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - New Theme</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            /* আপনার নতুন ব্যাকগ্রাউন্ড ছবির নাম এখানে দিন */
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ১. পয়েন্টার - চাকার ঠিক মাথায় */
        .royal-pointer {
            position: absolute;
            top: 5%; /* নতুন ব্যাকগ্রাউন্ড অনুযায়ী ৫-১০% এর মধ্যে অ্যাডজাস্ট করুন */
            width: 90px;
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            transform: rotate(180deg); /* মাথা নিচের দিকে রাখার জন্য */
        }

        /* ২. চাকা - একদম গোল এবং স্ক্রিনের মাঝখানে */
        .wheel-container {
            width: 400px; /* মোবাইল স্ক্রিনের জন্য এটি আদর্শ সাইজ */
            height: 400px;
            border-radius: 50%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            z-index: 50;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* ৩. স্পিন বাটন - চাকার নিচে */
        .spin-btn {
            margin-top: 30px;
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 180px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.7));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomStop = Math.floor(Math.random() * 360);
            rotation += (3600 + randomStop); 

            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                alert("চাকা থেমেছে! আপনার পুরস্কার চেক করুন।");
            }, 5000);
        }
    </script>

</body>
</html>
