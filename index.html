<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Perfectly Round</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - চাকার ঠিক মাথায় সঠিক পজিশন */
        .royal-pointer {
            position: absolute;
            top: 2%; /* আপনার ব্যাকগ্রাউন্ড অনুযায়ী সামান্য অ্যাডজাস্ট করুন */
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 80px;
            z-index: 100;
        }

        /* ২. চাকা - একদম গোল রাখার জন্য স্কয়ার কন্টেইনার */
        .wheel-container {
            position: absolute;
            top: 15%; /* পয়েন্টারের ঠিক নিচে */
            width: 90vw; /* স্ক্রিনের চওড়া অনুযায়ী */
            max-width: 400px; /* পিসিতে যেন অনেক বড় না হয়ে যায় */
            aspect-ratio: 1 / 1; /* এটিই চাকাটিকে সবসময় গোল রাখবে (ডিম হতে দেবে না) */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* ছবি যাতে চ্যাপ্টা না হয় তা নিশ্চিত করবে */
        }

        /* ৩. স্পিন বাটন - নিচের টেবিল বা পাথরের ওপর */
        .spin-btn {
            position: absolute;
            bottom: 5%; /* একদম নিচে */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 150px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- পয়েন্টার -->
        <img src="pointer.png" class="royal-pointer">

        <!-- গোল চাকা (এখন আর ডিম হবে না) -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <!-- স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 

            wheel.style.transform = `rotate(${rotation}deg)`;

            setTimeout(() => {
                spinning = false;
                alert("চাকা থেমেছে! অভিনন্দন!");
            }, 5000);
        }
    </script>

</body>
</html>
