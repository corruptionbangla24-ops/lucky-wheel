<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Maximum Size</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট - সর্বোচ্চ বড় করার জন্য */
        .wheel-unit {
            position: absolute;
            top: 5%; /* স্ক্রিনশট অনুযায়ী আরও উপরে তোলা হয়েছে */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 115vw; /* মোবাইল স্ক্রিনের চেয়েও ১৫% বড় রাখা হয়েছে যাতে একদম ধার ঘেঁষে থাকে */
            max-width: 750px; /* পিসি স্ক্রিনের জন্য লিমিট */
        }

        /* পয়েন্টার এডজাস্টমেন্ট */
        .royal-pointer {
            width: 85px; /* চাকা বড় হওয়ায় পয়েন্টারও বড় করা হয়েছে */
            margin-bottom: -25px; 
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.6));
        }

        /* চাকা কন্টেইনার */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            /* চাকাটি যেন প্রপারলি বড় দেখায় */
            transform: scale(1.1); 
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন - একদম নিচের দিকে */
        .spin-btn {
            position: absolute;
            bottom: 5%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 180px; /* বাটনটি বড় এবং স্পষ্ট */
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `scale(1.1) rotate(${rotation}deg)`; /* Scale বজায় রেখে ঘুরবে */

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
