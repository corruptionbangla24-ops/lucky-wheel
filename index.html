<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Long Hanging Pointer</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 2%; /* একদম ওপরের ফ্রেম থেকে শুরু হবে */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 150vw; /* চাকাটিকে অতিকায় বড় করার জন্য */
            max-width: 1000px;
        }

        /* লম্বা পয়েন্টার - যা ওপর থেকে ঝুলে চাকার গায়ে ঠেকে থাকবে */
        .royal-pointer {
            width: 60px;  /* পয়েন্টারটি একটু চিকন রাখলে লম্বা দেখাবে */
            height: 200px; /* লম্বায় অনেক বাড়ানো হয়েছে (আপনার চাহিদা মতো) */
            object-fit: contain;
            margin-bottom: -45px; /* এটি পয়েন্টারের মাথাকে চাকার গোল্ডেন বর্ডারের ওপর রাখবে */
            margin-left: 110px;   /* চাঁদের পাশ থেকে ঝুলে থাকার জন্য ডানে সরানো হলো */
            z-index: 100;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.9));
            transform: rotate(25deg); /* ডানে হেলানো পজিশন */
            transform-origin: top center; /* মনে হবে ওপরে আটকানো আছে */
            position: relative;
        }

        /* মেইন চাকা - আপনার স্ক্রিনশটের মতো ফুল স্ক্রিন */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.45); /* চাকাকে সর্বোচ্চ জুম করা হয়েছে */
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন - নিচে সুন্দর পজিশন */
        .spin-btn {
            position: absolute;
            bottom: 4%; 
            cursor: pointer;
            z-index: 110;
        }

        .spin-btn img {
            width: 200px; 
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- লম্বা পয়েন্টার যা ওপরে আটকানো মনে হবে এবং চাকার গায়ে ঠেকে থাকবে -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `scale(1.45) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
