<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Grand Size</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - আপনার ছবির একদম মাথায় স্থির থাকবে */
        .royal-pointer {
            position: absolute;
            top: 23%; /* আপনার ছবির পয়েন্টারের জায়গা অনুযায়ী */
            left: 50.2%; 
            transform: translateX(-50%) rotate(180deg);
            width: 80px; 
            z-index: 100;
        }

        /* ২. চাকা - বিশাল বড় করা হয়েছে (Maximized) */
        .wheel-container {
            position: absolute;
            top: 29.5%; /* ফ্রেমের পজিশন অনুযায়ী */
            width: 96vw; /* স্ক্রিনের প্রায় পুরো চওড়া জুড়ে থাকবে */
            max-width: 500px; 
            aspect-ratio: 1 / 1; /* চাকাটি একদম গোল রাখার জন্য */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            mix-blend-mode: multiply; /* সাদা ভাব দূর করতে */
        }

        /* ৩. স্পিন বাটন - একদম নিচে পানির ওপর নামিয়ে দেওয়া হয়েছে */
        .spin-btn {
            position: absolute;
            bottom: 3%; /* ৮% থেকে কমিয়ে ৩% করা হয়েছে যাতে নিচে থাকে */
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 190px; /* বাটনের সাইজ অ্যাডজাস্ট */
            mix-blend-mode: multiply;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <img src="pointer.png" class="royal-pointer">

        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
