<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Pointer Fixed</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* চাকা ও পয়েন্টার ইউনিট - স্ক্রিনশট অনুযায়ী পজিশন */
        .wheel-unit {
            position: absolute;
            top: 15%; /* চাঁদের নিচ থেকে চাকা শুরু হবে */
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100vw; /* ফুল স্ক্রিন উইডথ */
            max-width: 800px;
        }

        /* পয়েন্টার - এটি এখন চাকার একদম গায়ের সাথে লেগে থাকবে */
        .royal-pointer {
            width: 85px; 
            margin-bottom: -70px; /* এই ভ্যালুটি পয়েন্টারকে নিচে নামিয়ে চাকার সাথে লাগিয়ে দেবে */
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
            position: relative;
        }

        /* চাকা কন্টেইনার - আপনার অনুরোধ অনুযায়ী আরও বড় */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.25); /* চাকাকে অতিরিক্ত বড় (Extra Large) করার জন্য */
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* স্পিন বাটন - নিচে সুন্দরভাবে পজিশন করা */
        .spin-btn {
            position: absolute;
            bottom: 5%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 180px; 
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="wheel-unit">
            <!-- পয়েন্টার -->
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            
            <!-- মেইন চাকা -->
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;
            const wheel = document.getElementById('wheel-box');
            
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            
            // scale(1.25) বজায় রেখে চাকাটি ঘুরবে
            wheel.style.transform = `scale(1.25) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
