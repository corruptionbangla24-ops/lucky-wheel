<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Lucky Wheel - Connected UI</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* উপরে ডানদিকে ব্যালেন্স বোর্ড */
        .top-balance {
            position: absolute;
            top: 40px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 6px 15px;
            border-radius: 25px;
            border: 2px solid #ffd700;
            color: #ffd700;
            font-weight: bold;
            font-size: 18px;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 5px;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* চাকা ও পয়েন্টার ইউনিট */
        .wheel-unit {
            position: absolute;
            top: 5%; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 140vw; 
            max-width: 950px;
        }

        /* আপনার সেই প্রিয় বাঁকানো পয়েন্টার */
        .royal-pointer {
            width: 90px; 
            margin-bottom: -105px; 
            margin-left: 85px;    
            z-index: 100;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.9));
            transform: rotate(24deg); 
            transform-origin: bottom center;
            position: relative;
        }

        /* মেইন চাকা */
        .wheel-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            z-index: 50;
            transform: scale(1.35); 
        }

        .wheel-container img {
            width: 100%; height: 100%; object-fit: contain;
        }

        /* স্পিন বাটন - এটি এখন নিচের হলুদ বক্সের সাথে লাগানো থাকবে */
        .spin-btn {
            position: absolute;
            bottom: 10.5%; /* এই ভ্যালুটি বাটনকে একদম নিচের হলুদ বারের ওপর বসিয়ে দেবে */
            cursor: pointer;
            z-index: 130; /* হলুদ বক্সের ওপরে দেখানোর জন্য */
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .spin-btn img {
            width: 180px; 
        }

        .spin-btn:active { transform: scale(0.9); }

        /* ব্যালেন্স কন্ট্রোল (হলুদ বর্ডার বক্স) - একদম নিচে */
        .bottom-bet-box {
            position: absolute;
            bottom: 3%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            border-radius: 40px;
            padding: 5px 15px;
            width: 220px;
            height: 60px;
            z-index: 120;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); /* ওপরে হালকা ছায়া */
        }

        .btn-math {
            width: 48px;
            height: 48px;
            background: #ffd700;
            border: none;
            border-radius: 50%;
            font-size: 32px;
            font-weight: bold;
            color: #000;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .current-bet {
            color: #fff;
            font-size: 28px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- উপরে ডানে ব্যালেন্স -->
        <div class="top-balance">
            💰 <span id="balance">4880</span>
        </div>

        <!-- চাকা ইউনিট -->
        <div class="wheel-unit">
            <img src="pointer.png" class="royal-pointer" alt="Pointer">
            <div id="wheel-box" class="wheel-container">
                <img src="wheel.png" alt="Wheel">
            </div>
        </div>

        <!-- স্পিন বাটন - যা নিচের হলুদ লাইনের সাথে লাগানো -->
        <div id="spin-trigger" class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="স্পিন">
        </div>

        <!-- ব্যালেন্স কন্ট্রোল - একদম নিচে -->
        <div class="bottom-bet-box">
            <button class="btn-math" onclick="changeBet(-10)">-</button>
            <div class="current-bet" id="bet-val">10</div>
            <button class="btn-math" onclick="changeBet(10)">+</button>
        </div>
    </div>

    <script>
        let rotation = 0;
        let isSpinning = false;
        let balance = 4880;
        let currentBet = 10;

        function changeBet(val) {
            if (isSpinning) return;
            currentBet += val;
            if (currentBet < 10) currentBet = 10; 
            document.getElementById('bet-val').innerText = currentBet;
        }

        function startSpin() {
            if (isSpinning) return;
            if (balance < currentBet) {
                alert("ব্যালেন্স পর্যাপ্ত নয়!");
                return;
            }

            isSpinning = true;
            balance -= currentBet;
            document.getElementById('balance').innerText = balance;

            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360) + 1800; 
            rotation += randomExtra; 
            
            wheel.style.transform = `scale(1.35) rotate(${rotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
            }, 5000);
        }
    </script>

</body>
</html>
