<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Lucky Wheel - Perfect Alignment</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ১. পয়েন্টার - এখন সোজা এবং চাকার মাথায় একদম লেগে থাকবে */
        .royal-pointer {
            position: absolute;
            top: 25.5%; /* ব্যাকগ্রাউন্ড অনুযায়ী পজিশন */
            left: 50%;
            transform: translateX(-50%); /* রোটেশন সরিয়ে দেওয়া হয়েছে */
            width: 85px; 
            z-index: 100;
        }

        /* ২. চাকা - বিশাল বড় এবং পয়েন্টারের সাথে একদম স্পর্শ করে থাকবে */
        .wheel-container {
            position: absolute;
            top: 31.5%; /* এই মানটি পয়েন্টারের সাথে চাকাটিকে স্পর্শ করাবে */
            width: 98vw; /* স্ক্রিনের প্রায় পুরোটা জুড়ে বিশাল বড় */
            max-width: 520px; 
            aspect-ratio: 1 / 1; /* এটি চাকাটিকে সবসময় গোল রাখবে */
            z-index: 50;
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wheel-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 50%;
            mix-blend-mode: multiply; /* সাদা অংশ ব্যাকগ্রাউন্ডের সাথে মিশিয়ে দেবে */
        }

        /* ৩. স্পিন বাটন - একদম নিচে পাথরের ধারের কাছে */
        .spin-btn {
            position: absolute;
            bottom: 2%; 
            cursor: pointer;
            z-index: 110;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 210px; /* বাটনটি বড় করে নিচেরটি ঢেকে দেওয়া হয়েছে */
            mix-blend-mode: multiply;
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <!-- পয়েন্টার এখন সোজা -->
        <img src="pointer.png" class="royal-pointer">

        <!-- গোল চাকা (পয়েন্টারকে স্পর্শ করে আছে) -->
        <div id="wheel-box" class="wheel-container">
            <img src="wheel.png">
        </div>

        <!-- স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png">
        </div>
    </div>

    <script>
        let rotation = 0;
        let spinning = false;

        function startSpin() {
            if (spinning) return;
            spinning = true;
            const wheel = document.getElementById('wheel-box');
            const randomExtra = Math.floor(Math.random() * 360);
            rotation += (3600 + randomExtra); 
            wheel.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { spinning = false; }, 5000);
        }
    </script>

</body>
</html>
