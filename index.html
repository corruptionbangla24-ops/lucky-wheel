                
 <!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Wheel Game</title>
    <style>
        /* ১. ব্যাকগ্রাউন্ড সেটআপ */
        body, html {
            margin: 0; padding: 0; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000 url('background.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ২. চাকা কন্টেইনার (এখানেই চাকা ও পয়েন্টার থাকবে) */
        .wheel-wrapper {
            position: relative;
            width: 450px;
            height: 450px;
        }

        /* চাকার ছবি (আপনার বানানো চাকা) */
        #main-wheel {
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
        }

        /* চাকার ভেতর পয়েন্টার (আপনার লাল রত্নটি) */
        .inner-pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -100%); /* চাকার ঠিক মাঝখানে একটু উপরে */
            width: 80px; 
            z-index: 10;
            pointer-events: none; /* যাতে পয়েন্টারে ক্লিক না পড়ে */
        }

        /* ৩. স্পিন বাটন (নিচে থাকবে) */
        .spin-btn {
            margin-top: 40px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .spin-btn img {
            width: 220px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.6));
        }

        .spin-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="wheel-wrapper">
            <!-- চাকার ভেতরে পয়েন্টার -->
            <img src="pointer.png" class="inner-pointer" alt="Pointer">
            
            <!-- আপনার তৈরি করা মূল চাকা (যেখানে গুণ মার্ক করা আছে) -->
            <img src="wheel.png" id="main-wheel" alt="Wheel">
        </div>

        <!-- আপনার পাঠানো গোল্ডেন স্পিন বাটন -->
        <div class="spin-btn" onclick="startSpin()">
            <img src="spin-button.png" alt="SPIN">
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isSpinning = false;

        function startSpin() {
            if (isSpinning) return;
            isSpinning = true;

            const wheel = document.getElementById('main-wheel');
            // অন্তত ১০ বার ঘুরবে এবং তারপর র‍্যান্ডম জায়গায় থামবে
            const randomExtra = Math.floor(Math.random() * 360);
            currentRotation += (3600 + randomExtra); 

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // ৫ সেকেন্ড পর স্পিন থামলে মেসেজ বা লজিক
            setTimeout(() => {
                isSpinning = false;
                console.log("স্পিন সম্পন্ন হয়েছে!");
            }, 5000);
        }
    </script>

</body>
</html>
